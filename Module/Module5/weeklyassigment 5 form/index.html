<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Registration Form</title>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-teal-50 flex items-center justify-center p-4">
<div class="w-full max-w-2xl">
  <div class="rounded-2xl bg-white shadow-xl ring-1 ring-slate-900/5">
    <div class="border-b border-slate-100 px-6 py-5">
      <h1 class="text-2xl font-semibold text-slate-900">Registration Form</h1>
      <p class="mt-1 text-sm text-slate-500">Please fill in your details below.</p>
    </div>

    <form id="detailsForm" class="grid grid-cols-1 gap-6 px-6 py-6 sm:grid-cols-2" novalidate>
      <!-- Name -->
      <div class="sm:col-span-2">
        <label for="name" class="block text-sm font-medium text-slate-700">Full Name</label>
        <input type="text" id="name" name="name" placeholder="John Doe"
               class="mt-2 block w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-teal-500">
        <p class="mt-1 hidden text-xs text-red-500" data-error-for="name"></p>
      </div>

      <!-- Age -->
      <div>
        <label for="age" class="block text-sm font-medium text-slate-700">Age</label>
        <input type="number" id="age" name="age" min="1" max="120" placeholder="25"
               class="mt-2 block w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-teal-500">
        <p class="mt-1 hidden text-xs text-red-500" data-error-for="age"></p>
      </div>

      <!-- Date of Birth -->
      <div>
        <label for="dob" class="block text-sm font-medium text-slate-700">Date of Birth</label>
        <input type="date" id="dob" name="dob"
               class="mt-2 block w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-teal-500">
        <p class="mt-1 hidden text-xs text-red-500" data-error-for="dob"></p>
      </div>

      <!-- Gender (radio buttons) -->
      <div class="sm:col-span-2">
        <span class="block text-sm font-medium text-slate-700">Gender</span>
        <div class="mt-2 flex flex-wrap gap-4">
          <label class="flex items-center gap-2 text-sm text-slate-600">
            <input type="radio" name="gender" value="Male"
                   class="h-4 w-4 border-slate-300 text-teal-600 focus:ring-teal-500">
            Male
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-600">
            <input type="radio" name="gender" value="Female"
                   class="h-4 w-4 border-slate-300 text-teal-600 focus:ring-teal-500">
            Female
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-600">
            <input type="radio" name="gender" value="Other"
                   class="h-4 w-4 border-slate-300 text-teal-600 focus:ring-teal-500">
            Other
          </label>
        </div>
        <p class="mt-1 hidden text-xs text-red-500" data-error-for="gender"></p>
      </div>

      <!-- Phone -->
      <div>
        <label for="phone" class="block text-sm font-medium text-slate-700">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 234 567 890"
               class="mt-2 block w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-teal-500">
        <p class="mt-1 hidden text-xs text-red-500" data-error-for="phone"></p>
      </div>

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
        <input type="email" id="email" name="email" placeholder="john@example.com"
               class="mt-2 block w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-teal-500">
        <p class="mt-1 hidden text-xs text-red-500" data-error-for="email"></p>
      </div>

      <!-- Address -->
      <div class="sm:col-span-2">
        <label for="address" class="block text-sm font-medium text-slate-700">Address</label>
        <textarea id="address" name="address" rows="3" placeholder="123 Main St, City, Country"
                  class="mt-2 block w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-900 placeholder-slate-400 focus:border-teal-500 focus:bg-white focus:outline-none focus:ring-1 focus:ring-teal-500"></textarea>
        <p class="mt-1 hidden text-xs text-red-500" data-error-for="address"></p>
      </div>

      <!-- Skills -->
      <div class="sm:col-span-2">
        <span class="block text-sm font-medium text-slate-700">Skills</span>
        <p class="mt-1 text-xs text-slate-400">Tap to select the skills that apply.</p>
        <div id="skills" class="mt-2 flex flex-wrap gap-2">
          <button type="button" data-skill="JavaScript" aria-pressed="false"
                  class="skill-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 transition hover:border-teal-400 hover:text-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1">JavaScript</button>
          <button type="button" data-skill="TypeScript" aria-pressed="false"
                  class="skill-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 transition hover:border-teal-400 hover:text-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1">TypeScript</button>
          <button type="button" data-skill="Python" aria-pressed="false"
                  class="skill-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 transition hover:border-teal-400 hover:text-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1">Python</button>
          <button type="button" data-skill="React" aria-pressed="false"
                  class="skill-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 transition hover:border-teal-400 hover:text-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1">React</button>
          <button type="button" data-skill="Node.js" aria-pressed="false"
                  class="skill-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 transition hover:border-teal-400 hover:text-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1">Node.js</button>
          <button type="button" data-skill="CSS" aria-pressed="false"
                  class="skill-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 transition hover:border-teal-400 hover:text-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1">CSS</button>
          <button type="button" data-skill="SQL" aria-pressed="false"
                  class="skill-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 transition hover:border-teal-400 hover:text-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1">SQL</button>
          <button type="button" data-skill="Java" aria-pressed="false"
                  class="skill-btn rounded-full border border-slate-200 bg-white px-3 py-1.5 text-sm font-medium text-slate-600 transition hover:border-teal-400 hover:text-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1">Java</button>
        </div>
        <p class="mt-1 hidden text-xs text-red-500" data-error-for="skills"></p>
      </div>

      <!-- Actions -->
      <div class="flex items-center justify-end gap-3 sm:col-span-2">
        <button type="reset"
                class="rounded-lg border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 focus:outline-none">
          Reset
        </button>
        <button type="submit"
                class="rounded-lg bg-teal-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-teal-500 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 focus:ring-offset-white">
          Submit
        </button>
      </div>
    </form>
  </div>

  <!-- Success message -->
  <div id="result" class="mt-4 hidden rounded-lg border border-teal-200 bg-teal-50 px-4 py-3 text-sm text-teal-700"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
