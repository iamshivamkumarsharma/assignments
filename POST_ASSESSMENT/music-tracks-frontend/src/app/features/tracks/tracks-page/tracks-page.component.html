<!-- Toast notification -->
@if (toast(); as t) {
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;">
    <div
      class="toast show align-items-center text-bg-{{ t.type }} border-0"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
    >
      <div class="d-flex">
        <div class="toast-body">
          <i
            class="bi me-2"
            [class.bi-check-circle]="t.type === 'success'"
            [class.bi-exclamation-triangle]="t.type === 'danger'"
          ></i>
          {{ t.message }}
        </div>
        <button
          type="button"
          class="btn-close btn-close-white me-2 m-auto"
          aria-label="Close"
          (click)="toast.set(null)"
        ></button>
      </div>
    </div>
  </div>
}

<div class="container py-4">
  <!-- Header -->
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
    <div>
      <h1 class="h3 mb-1"><i class="bi bi-vinyl-fill text-primary me-2"></i>Music Tracks</h1>
      <p class="text-muted mb-0">Manage your music catalog.</p>
    </div>
    <button
      type="button"
      class="btn btn-primary"
      data-bs-toggle="modal"
      data-bs-target="#trackModal"
    >
      <i class="bi bi-plus-lg me-1"></i>Add Track
    </button>
  </div>

  <!-- Search bar -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <form class="row g-2 align-items-end" (ngSubmit)="onSearch()">
        <div class="col-sm">
          <label for="searchTitle" class="form-label mb-1 small text-muted">
            Search by exact title
          </label>
          <input
            id="searchTitle"
            type="text"
            class="form-control"
            placeholder="Enter track title…"
            name="searchTitle"
            [(ngModel)]="searchTitle"
          />
        </div>
        <div class="col-sm-auto d-flex gap-2">
          <button type="submit" class="btn btn-outline-primary" [disabled]="searching()">
            @if (searching()) {
              <span class="spinner-border spinner-border-sm me-1"></span>
            } @else {
              <i class="bi bi-search me-1"></i>
            }
            Search
          </button>
          <button type="button" class="btn btn-outline-secondary" (click)="clearSearch()">
            <i class="bi bi-x-lg me-1"></i>Clear
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Track list -->
  <div class="card shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <span class="fw-semibold"><i class="bi bi-list-ul me-2"></i>Tracks</span>
      <span class="badge text-bg-primary rounded-pill">{{ tracks().length }}</span>
    </div>
    <div class="card-body p-0">
      <app-track-list
        [tracks]="tracks()"
        [loading]="loading()"
        (deleteTrack)="onDelete($event)"
      />
    </div>
  </div>
</div>

<!-- Add Track modal -->
<div
  class="modal fade"
  id="trackModal"
  tabindex="-1"
  aria-labelledby="trackModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="trackModalLabel">
          <i class="bi bi-music-note-beamed me-2"></i>Add New Track
        </h5>
        <button
          #modalClose
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <app-track-form (createTrack)="onCreate($event)" />
      </div>
    </div>
  </div>
</div>
