spring.application.name=LoanEmiCalculator

# In-memory H2 database (zero setup). Console at /h2-console
spring.datasource.url=jdbc:h2:mem:loanemi;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true

# Fetch related settings: disable open-session-in-view so lazy loading is handled
# explicitly in transactional service methods (avoids accidental N+1 during view render).
spring.jpa.open-in-view=false

# --- Logging ---
logging.level.root=INFO
logging.level.org.nbfc.loanemicalculator=DEBUG
logging.level.org.hibernate.SQL=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# --- Actuator (health, info, metrics) ---
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=when_authorized
info.app.name=Loan EMI Management API
info.app.description=Secure NBFC REST API for loans, EMIs, penalties and analytics

# --- To use PostgreSQL instead, comment the H2 block above and uncomment below ---
